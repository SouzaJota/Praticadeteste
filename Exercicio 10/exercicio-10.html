<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10 - Velocidade Média</title>
    <link rel="stylesheet" href="exercicio-10.css">
</head>
<body>
    <div class="container">
        <h1>Velocidade Média</h1>
        <label for="distanciaKm">Distância (km)</label>
        <input id="distanciaKm" type="number" step="0.01" min="0">

        <label for="tempo">Tempo</label>
        <input id="tempo" type="number" step="0.01" min="0">

        <label for="unidadeTempo">Unidade de tempo</label>
        <select id="unidadeTempo">
            <option value="h">Horas</option>
            <option value="min">Minutos</option>
        </select>

        <button onclick="calcular()">Calcular</button>
        <div id="resultado"></div>
    </div>
    <script src="exercicio-10.js"></script>
</body>
</html>
