<body>

        <h1>Divisão de Lucro entre Sócios</h1>

        <label for="lucroTotal">Lucro total (R$)</label>

        <label for="quantidadeSocios">Quantidade de sócios</label>
        <input type="number" id="quantidadeSocios" placeholder="Digite o número de sócios" value="3" min="1">

        <button onclick="calcular()">Calcular</button>

        <div id="resultado"></div>
    </div>
